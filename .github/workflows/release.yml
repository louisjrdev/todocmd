name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: todocmd-macos-app
          - os: windows-latest
            artifact_name: todocmd-windows

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        if: matrix.os == 'macos-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bundle

      - name: Install WiX toolset
        if: matrix.os == 'windows-latest'
        run: choco install wixtoolset --no-progress -y

      - name: Add WiX to PATH
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $wixDir = Get-ChildItem 'C:\Program Files (x86)' -Directory |
            Where-Object Name -like 'WiX Toolset v*' |
            Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $wixDir) {
            throw 'WiX Toolset install directory was not found.'
          }
          "$wixDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install cargo-wix
        if: matrix.os == 'windows-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-wix

      - name: Build release binary
        run: cargo build --release

      - name: Bundle macOS app
        if: matrix.os == 'macos-latest'
        run: cargo bundle --release --format osx

      - name: Ad-hoc sign macOS app
        if: matrix.os == 'macos-latest'
        run: |
          codesign --force --deep --sign - target/release/bundle/osx/TodoCmd.app
          codesign --verify --deep --strict target/release/bundle/osx/TodoCmd.app

      - name: Archive macOS app
        if: matrix.os == 'macos-latest'
        run: ditto -c -k --sequesterRsrc --keepParent target/release/bundle/osx/TodoCmd.app target/release/TodoCmd-macos.zip

      - name: Package Windows zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path target/release/todocmd.exe -DestinationPath target/release/TodoCmd-windows.zip -Force

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path "wix/main.wxs")) {
            cargo wix init
          }
          cargo wix --no-build --nocapture

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/release/TodoCmd-macos.zip
            target/release/bundle/osx/TodoCmd.app
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/release/TodoCmd-windows.zip
            target/wix/*.msi
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release directory
        run: mkdir -p release

      - name: Move artifacts to release directory
        run: |
          find artifacts -type f \( -name "*.zip" -o -name "*.msi" \) -exec mv {} release/ \;

      - name: List release files
        run: ls -la release/

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$(sed -n 's/^version = \"\\(.*\\)\"/\\1/p' Cargo.toml | head -n1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          name: TodoCmd v${{ steps.version.outputs.VERSION }}
          body: |
            ## TodoCmd v${{ steps.version.outputs.VERSION }}
            
            ### Downloads
            
            **macOS**
            - **TodoCmd-macos.zip** - Bundled `.app` archive

            **Windows**
            - **`.msi` installer** - Standard Windows installer
            - **TodoCmd-windows.zip** - Portable executable archive
            
            ### Installation
            
            1. Download the appropriate file for your platform
            2. **macOS**: Unzip, then move `TodoCmd.app` into `Applications`
            3. **Windows**: Run the `.msi` installer, or unzip the portable build
            4. Launch with `Alt+K` from anywhere
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
